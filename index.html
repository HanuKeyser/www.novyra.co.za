<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Novyra - New Light</title>

<style>

/* =========================
   DESIGN SYSTEM
========================= */

:root{
  --glass-bg: rgba(255,255,255,0.28);
  --glass-border: rgba(255,255,255,0.6);
  --blur: blur(50px);

  --radius-lg: 18px;

  --text: #0f172a;

  --space-1: 8px;
  --space-2: 12px;
  --space-3: 18px;
}

/* =========================
   BASE
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui,-apple-system,sans-serif;
}

body{
  overflow-x:hidden;
  color:var(--text);
}

/* smooth scroll */
html{
  scroll-behavior:smooth;
}

/* =========================
   SCROLLBAR
========================= */

::-webkit-scrollbar{
  width:10px;
}

::-webkit-scrollbar-track{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  border-left:1px solid rgba(255,255,255,0.35);
}

::-webkit-scrollbar-thumb{
  background:linear-gradient(
    180deg,
    rgba(99, 102, 241, 0.55),
    rgba(59, 130, 246, 0.45)
  );

  border:1px solid rgba(255,255,255,0.25);
  border-radius:20px;

  backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);
}

/* =========================
   SECTIONS
========================= */

section{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:80px 20px;
  text-align:center;
}

#s1{ background:radial-gradient(circle at top,#eef3ff,#ffffff); }
#s2{ background:linear-gradient(180deg,#f7f9ff,#eef3ff); }
#s3{ background:radial-gradient(circle at bottom,#f2f6ff,#ffffff); }
#s4{ background:linear-gradient(180deg,#ffffff,#f3f6ff); }
#s5{ background:radial-gradient(circle at top,#eef3ff,#f9fbff); }

/* =========================
   TYPOGRAPHY
========================= */

h1{
  font-size: clamp(42px, 6vw, 64px);
  letter-spacing:-0.6px;
}

/* =========================
   HEADER
========================= */

header{
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;
}

.top-bar{
  max-width:1120px;
  margin:18px auto;
  padding:0 14px;

  display:flex;
  align-items:center;
  gap:12px;
}

/* =========================
   NAV BAR
========================= */

.nav{
  flex:1;
  height:64px;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 14px;

  background:var(--glass-bg);
  backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);

  border:1px solid var(--glass-border);
  border-radius:var(--radius-lg);

  box-shadow:0 18px 45px rgba(0,0,0,0.08);
}

.logo{
  font-size:14px;
  font-weight:600;
}

/* =========================
   NAV LINKS (UNIFIED SYSTEM)
========================= */

nav ul{
  display:flex;
  gap:6px;
  list-style:none;
}

nav a,
.mobile a{
  text-decoration:none;
  color:var(--text);
  font-size:14px;
  padding:7px 10px;
  border-radius:10px;
  transition:0.2s ease;
  display:inline-flex;
  align-items:center;
}

nav a:hover,
.mobile a:hover{
  background:rgba(255,255,255,0.6);
}

/* =========================
   THEME BUTTON
========================= */

.theme-toggle{
  width:64px;
  height:64px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:var(--radius-lg);

  background:var(--glass-bg);
  backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);

  border:1px solid var(--glass-border);

  cursor:pointer;
  box-shadow:0 18px 45px rgba(0,0,0,0.08);

  position:relative;
}

/* ICONS */

.theme-toggle svg{
  position:absolute;
  width:26px;
  height:26px;

  stroke:#0f172a;
  fill:none;
  stroke-width:1.8;

  transition:0.4s ease;
}

.theme-toggle .sun{
  opacity:1;
  transform:rotate(0) scale(1);
}

.theme-toggle .moon{
  opacity:0;
  transform:rotate(-90deg) scale(0.6);
}

.theme-toggle.active .sun{
  opacity:0;
  transform:rotate(90deg) scale(0.6);
}

.theme-toggle.active .moon{
  opacity:1;
  transform:rotate(0) scale(1);
}

/* =========================
   HAMBURGER (UNCHANGED LOOK)
========================= */

.menu-toggle{
  width:42px;
  height:42px;

  display:none;
  align-items:center;
  justify-content:center;

  border-radius:12px;
  background:rgba(255,255,255,0.28);
  border:1px solid rgba(255,255,255,0.6);

  cursor:pointer;
  position:relative;
}

.menu-toggle span{
  position:absolute;
  width:18px;
  height:2px;
  background:#0f172a;
  border-radius:20px;
  transition:0.3s ease;
}

.menu-toggle span:nth-child(1){ transform:translateY(-6px); }
.menu-toggle span:nth-child(2){ transform:translateY(0); }
.menu-toggle span:nth-child(3){ transform:translateY(6px); }

.menu-open .menu-toggle span:nth-child(1){
  transform:rotate(45deg);
}

.menu-open .menu-toggle span:nth-child(2){
  opacity:0;
}

.menu-open .menu-toggle span:nth-child(3){
  transform:rotate(-45deg);
}

/* =========================
   MOBILE MENU
========================= */

.mobile{
  position:fixed;
  top: calc(64px + var(--space-3) + var(--space-1));
  left:50%;
  transform:translateX(-50%) scale(1.04);

  width:92%;
  max-width:420px;

  display:flex;
  flex-direction:column;
  gap:12px;

  padding:22px;

  background:var(--glass-bg);
  backdrop-filter:blur(60px);
  border:1px solid var(--glass-border);
  border-radius:22px;

  opacity:0;
  pointer-events:none;
  transition:0.35s ease;

  box-shadow:0 18px 45px rgba(0,0,0,0.08);
}

.mobile.active{
  opacity:1;
  pointer-events:auto;
  transform:translateX(-50%) scale(1);
}

/* slightly larger mobile tap targets */
.mobile a{
  font-size:16px;
  padding:12px 12px;
}

/* =========================
   FOOTER
========================= */

footer{
  padding:16px 14px;

  background:var(--glass-bg);
  backdrop-filter:blur(50px);
  -webkit-backdrop-filter:blur(50px);

  border-top:1px solid var(--glass-border);

  text-align:center;
}

footer p{
  font-size:13px;
  opacity:0.65;
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:768px){
  nav ul{ display:none; }
  .menu-toggle{ display:flex; }
}

</style>
</head>

<body>

<header>
  <div class="top-bar">

    <div class="nav">
      <div class="logo">Novyra</div>

      <nav>
        <ul>
          <li><a href="#s1">One</a></li>
          <li><a href="#s2">Two</a></li>
          <li><a href="#s3">Three</a></li>
          <li><a href="#s4">Four</a></li>
          <li><a href="#s5">Five</a></li>
        </ul>
      </nav>

      <div class="menu-toggle" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="theme-toggle" id="themeBtn" onclick="toggleTheme()">

      <svg class="sun" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M19 5l-1.5 1.5M5 19l1.5-1.5M19 19l-1.5-1.5"/>
      </svg>

      <svg class="moon" viewBox="0 0 24 24">
        <path fill="currentColor" d="
          M21 13.5
          A8 8 0 1 1 10.5 3
          A6.5 6.5 0 1 0 21 13.5
          Z"/>
      </svg>

    </div>

  </div>
</header>

<div class="mobile" id="mobile">
  <a href="#s1" onclick="toggleMenu()">One</a>
  <a href="#s2" onclick="toggleMenu()">Two</a>
  <a href="#s3" onclick="toggleMenu()">Three</a>
  <a href="#s4" onclick="toggleMenu()">Four</a>
  <a href="#s5" onclick="toggleMenu()">Five</a>
</div>

<section id="s1"><h1>Novyra</h1></section>
<section id="s2"><h1>Design</h1></section>
<section id="s3"><h1>System</h1></section>
<section id="s4"><h1>Flow</h1></section>
<section id="s5"><h1>Future</h1></section>

<footer>
  <p>© 2026 Novyra - New Era of Creation</p>
</footer>

<script>

function toggleMenu(){
  document.body.classList.toggle("menu-open");
  document.getElementById("mobile").classList.toggle("active");
}

function toggleTheme(){
  document.getElementById("themeBtn").classList.toggle("active");
}

</script>

</body>
</html>
