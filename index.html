  <style>

/* =========================
   DESIGN SYSTEM
========================= */

:root{
  --glass-bg: rgba(255,255,255,0.28);
  --glass-border: rgba(255,255,255,0.6);
  --blur: blur(50px);

  --radius-lg: 18px;

  --text: #000;

  --space-1: 8px;
  --space-2: 12px;
  --space-3: 18px;
}

/* =========================
   BASE
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui,-apple-system,sans-serif;
}

body{
  overflow-x:hidden;
  color:var(--text);
}

/* smooth scroll */
html{
  scroll-behavior:smooth;
}



/* =========================
   SECTIONS (UPDATED COLORS)
========================= */

section{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:80px 20px;
  text-align:center;
  margin:0;
}

/* soft light blue backgrounds */
#s1{
  background:#f0f6ff;
}

#s2{
  background:#f0f6ff;
}

#s3{
  background:#f0f6ff;
}

#s4{
  background:#f0f6ff;
}

#s5{
  background:#f0f6ff;
}

/* =========================
   TYPOGRAPHY
========================= */

h1{
  font-size: clamp(42px, 6vw, 64px);
  letter-spacing:-0.6px;
  color:#000;
}

/* =========================
   HEADER
========================= */

header{
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;
}

.top-bar{
  max-width:1120px;
  margin:18px auto;
  padding:0 14px;

  display:flex;
  align-items:center;
  gap:12px;
}

/* =========================
   NAV BAR
========================= */

.nav{
  flex:1;
  height:64px;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 14px;

  background:var(--glass-bg);
  backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);

  border:1px solid var(--glass-border);
  border-radius:var(--radius-lg);

  box-shadow:0 18px 45px rgba(0,0,0,0.08);
}

.logo{
  height: 32px;
  width: auto;
  object-fit: contain;
}

/* =========================
   NAV LINKS
========================= */

nav ul{
  display:flex;
  gap:6px;
  list-style:none;
}

nav a,
.mobile a{
  text-decoration:none;
  color:#000;
  font-size:14px;
  padding:7px 10px;
  border-radius:10px;
  transition:0.2s ease;
  display:inline-flex;
  align-items:center;
}

nav a:hover,
.mobile a:hover{
  background:rgba(255,255,255,0.6);
}

/* =========================
   THEME BUTTON
========================= */

.theme-toggle{
  width:64px;
  height:64px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:var(--radius-lg);

  background:var(--glass-bg);
  backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);

  border:1px solid var(--glass-border);

  cursor:pointer;
  box-shadow:0 18px 45px rgba(0,0,0,0.08);

  position:relative;
}

.theme-toggle svg{
  position:absolute;
  width:26px;
  height:26px;

  stroke:#000;
  fill:none;
  stroke-width:1.8;

  transition:0.4s ease;
}

.theme-toggle .sun{
  opacity:1;
  transform:rotate(0) scale(1);
}

.theme-toggle .moon{
  opacity:0;
  transform:rotate(-90deg) scale(0.6);
}

.theme-toggle.active .sun{
  opacity:0;
  transform:rotate(90deg) scale(0.6);
}

.theme-toggle.active .moon{
  opacity:1;
  transform:rotate(0) scale(1);
}

/* =========================
   HAMBURGER
========================= */

.menu-toggle{
  width:42px;
  height:42px;

  display:none;
  align-items:center;
  justify-content:center;

  border-radius:12px;
  background:rgba(255,255,255,0.28);
  border:1px solid rgba(255,255,255,0.6);

  cursor:pointer;
  position:relative;
}

.menu-toggle span{
  position:absolute;
  width:18px;
  height:2px;
  background:#000;
  border-radius:20px;
  transition:0.3s ease;
}

.menu-toggle span:nth-child(1){ transform:translateY(-6px); }
.menu-toggle span:nth-child(2){ transform:translateY(0); }
.menu-toggle span:nth-child(3){ transform:translateY(6px); }

.menu-open .menu-toggle span:nth-child(1){ transform:rotate(45deg); }
.menu-open .menu-toggle span:nth-child(2){ opacity:0; }
.menu-open .menu-toggle span:nth-child(3){ transform:rotate(-45deg); }

/* =========================
   MOBILE MENU
========================= */

.mobile{
  position:fixed;
  top: calc(64px + 19px + 12px);
  left:50%;
  transform:translateX(-50%) scale(1.04);

  width:92%;
  max-width:420px;

  display:flex;
  flex-direction:column;
  gap:12px;

  padding:22px;

  background:var(--glass-bg);
  backdrop-filter:blur(60px);
  border:1px solid var(--glass-border);
  border-radius:22px;

  opacity:0;
  pointer-events:none;
  transition:0.35s ease;

  box-shadow:0 18px 45px rgba(0,0,0,0.08);
}

.mobile.active{
  opacity:1;
  pointer-events:auto;
  transform:translateX(-50%) scale(1);
}

.mobile a{
  font-size:16px;
  padding:12px 12px;
}

/* =========================
   FOOTER
========================= */

footer{
  padding:16px 14px;

  background:#f0f6ff;

  text-align:center;
}

footer p{
  font-size:13px;
  opacity:0.65;
  color:#000;
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:768px){
  nav ul{ display:none; }
  .menu-toggle{ display:flex; }
  
  #s5 > div > div {
    grid-template-columns: 1fr !important;
  }
}

</style>

  <script>

function toggleMenu(){
  document.body.classList.toggle("menu-open");
  document.getElementById("mobile").classList.toggle("active");
}

function toggleTheme(){
  document.getElementById("themeBtn").classList.toggle("active");
}

// Contact form handling
document.getElementById("contactForm").addEventListener("submit", function(e){
  e.preventDefault();
  
  const form = this;
  const messageDiv = document.getElementById("formMessage");
  const name = form.name.value.trim();
  const email = form.email.value.trim();
  const message = form.message.value.trim();
  
  if(!name || !email || !message){
    messageDiv.textContent = "Please fill in all fields.";
    messageDiv.style.color = "#e74c3c";
    messageDiv.style.display = "block";
    return;
  }
  
  // Simulate successful submission
  messageDiv.textContent = "✓ Message sent successfully! We'll get back to you soon.";
  messageDiv.style.color = "#27ae60";
  messageDiv.style.display = "block";
  
  form.reset();
  
  // Clear message after 5 seconds
  setTimeout(function(){
    messageDiv.style.display = "none";
  }, 5000);
}

// Initialize Lucide icons
lucide.createIcons();
