<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Novyra - New Light</title>

<link rel="icon" type="image/png" href="Novyra-Logo.png">
<link rel="apple-touch-icon" href="Novyra-Logo.png">

<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* =========================
   DESIGN SYSTEM (ORGANIC)
========================= */

:root{
  --bg-1: #F6F1EA;
  --bg-2: #EEF3EE;
  --bg-3: #FAF7F2;

  /* original accent (green) */
  --scroll-track: rgba(255,255,255,0.35);
  --scroll-thumb: rgba(46, 125, 107, 0.45);
  --scroll-thumb-hover: rgba(46, 125, 107, 0.65);

  /* NEW: brown accent (added, not replaced) */
  --accent-brown: #6B4F3A;
  --accent-brown-soft: rgba(107, 79, 58, 0.12);
  --accent-brown-hover: rgba(107, 79, 58, 0.65);
}

/* =========================
   BASE
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* =========================
   CUSTOM SCROLLBAR
========================= */

::-webkit-scrollbar{
  width: 10px;
}

::-webkit-scrollbar-track{
  background: var(--scroll-track);
  backdrop-filter: blur(10px);
}

::-webkit-scrollbar-thumb{
  background: var(--scroll-thumb);
  border-radius: 20px;
  border: 2px solid rgba(255,255,255,0.4);
  transition: 0.3s ease;
}

::-webkit-scrollbar-thumb:hover{
  background: var(--scroll-thumb-hover);
}

/* =========================
   FIREFOX SCROLLBAR
========================= */

html{
  scrollbar-width: thin;
  scrollbar-color: var(--scroll-thumb) var(--scroll-track);
  scroll-behavior:smooth;
}

/* =========================
   BODY
========================= */

body{
  overflow-x:hidden;
  color:#1C1C1C;
  background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
  font-family: 'Inter', system-ui, sans-serif;
}

/* =========================
   TYPOGRAPHY
========================= */

h1, h2, h3, h4, h5, h6{
  font-family: 'Fraunces', serif;
  font-weight:600;
  letter-spacing:0.2px;
}

p, a, li, span{
  font-family: 'Inter', system-ui, sans-serif;
}

/* =========================
   SECTIONS
========================= */

section{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:80px 20px;
  text-align:center;
}

/* =========================
   GLASS SYSTEM
========================= */

.glass-card {
  background: rgba(255, 255, 255, 0.22);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);

  border-radius: 22px;
  border: 1px solid rgba(255, 255, 255, 0.45);

  box-shadow:
    0 10px 40px rgba(0, 0, 0, 0.08),
    inset 0 1px 0 rgba(255, 255, 255, 0.6);
}

/* =========================
   HEADER
========================= */

header{
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;
}

.top-bar{
  max-width:1400px;
  margin:18px auto;
  padding:0 14px;
  display:flex;
  align-items:center;
  gap:12px;
}

.nav{
  flex:1;
  height:64px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
}

.logo{ height:32px; }

nav ul{
  display:flex;
  gap:10px;
  list-style:none;
}

nav a,
.mobile a{
  text-decoration:none;
  color:#1C1C1C;
  font-size:14px;
  padding:7px 10px;
  border-radius:10px;
  transition:0.2s ease;
}

/* UPDATED: uses BOTH green feel + brown accent logic */
nav a:hover,
.mobile a:hover{
  background: var(--accent-brown-soft);
}

/* =========================
   HAMBURGER
========================= */

.menu-toggle{
  width:42px;
  height:42px;
  display:none;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  position:relative;
}

.menu-toggle span{
  position:absolute;
  width:18px;
  height:2px;
  background:#1C1C1C;
  transition:0.3s ease;
}

.menu-toggle span:nth-child(1){ transform:translateY(-6px); }
.menu-toggle span:nth-child(2){ transform:translateY(0); }
.menu-toggle span:nth-child(3){ transform:translateY(6px); }

.menu-open .menu-toggle span:nth-child(1){ transform:rotate(45deg); }
.menu-open .menu-toggle span:nth-child(2){ opacity:0; }
.menu-open .menu-toggle span:nth-child(3){ transform:rotate(-45deg); }

/* =========================
   MOBILE MENU
========================= */

.mobile{
  position:fixed;
  top:100px;
  left:50%;
  transform:translateX(-50%) scale(0.98);

  width:92%;
  max-width:420px;

  display:flex;
  flex-direction:column;
  gap:12px;

  padding:22px;

  opacity:0;
  pointer-events:none;
  transition:0.25s ease;
}

.mobile.active{
  opacity:1;
  pointer-events:auto;
  transform:translateX(-50%) scale(1);
}

/* =========================
   FOOTER
========================= */

footer{
  padding:16px;
  text-align:center;
  border-top:1px solid rgba(0,0,0,0.08);
  font-size: 12px;
  opacity: 0.75;
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:768px){
  nav ul{ display:none; }
  .menu-toggle{ display:flex; }
}

</style>
</head>

<body>

<header>
  <div class="top-bar">

    <div class="nav glass-card">
      <img src="Novyra-Logo.png" class="logo">

      <nav>
        <ul>
          <li><a href="#home">Home</a></li>
          <li><a href="#about-novyra">About Novyra</a></li>
          <li><a href="#transformed-visions">Transformed Visions</a></li>
          <li><a href="#creative-services">Creative Services</a></li>
          <li><a href="https://www.novyra.co.za/contact-us/">Contact Us</a></li>
        </ul>
      </nav>

      <div class="menu-toggle glass-card" id="menuBtn">
        <span></span><span></span><span></span>
      </div>

    </div>

  </div>
</header>

<div class="mobile glass-card" id="mobile">
  <a href="#home">Home</a>
  <a href="#about-novyra">About Novyra</a>
  <a href="#transformed-visions">Transformed Visions</a>
  <a href="#creative-services">Creative Services</a>
  <a href="https://www.novyra.co.za/contact-us/">Contact Us</a>
</div>

<section id="home"><h1>Home</h1></section>
<section id="about-novyra"><h1>About Novyra</h1></section>
<section id="transformed-visions"><h1>Transformed Visions</h1></section>
<section id="creative-services"><h1>Creative Services</h1></section>

<footer>
  <p>© 2026 Novyra - New Era of Creation - All Rights Reserved</p>
</footer>

<script>

const menuBtn = document.getElementById("menuBtn");
const mobile = document.getElementById("mobile");

menuBtn.addEventListener("click", () => {
  document.body.classList.toggle("menu-open");
  mobile.classList.toggle("active");
});

document.querySelectorAll(".mobile a").forEach(a => {
  a.addEventListener("click", () => {
    document.body.classList.remove("menu-open");
    mobile.classList.remove("active");
  });
});

</script>

</body>
</html>
