<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Novyra - New Era of Creation</title>

  <link rel="icon" type="image/png" href="Novyra Emblem Logo (Light Theme).png">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: sans-serif;
      background: rgba(17, 17, 16, 1);
      color: white;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(17, 17, 16, 1); }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(to bottom, rgba(147,197,253,1), rgba(59,130,246,1));
      border-radius: 10px;
    }

    /* Dropdown animation */
    .dropdown {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transform: translateY(-10px);
      transition: all 0.3s ease;
    }

    .dropdown.open {
      max-height: 220px;
      opacity: 1;
      transform: translateY(0);
    }

    /* Hamburger */
    .hamburger span {
      display: block;
      height: 2px;
      width: 18px;
      background: rgba(229,231,235,1);
      border-radius: 2px;
      transition: all 0.25s ease;
    }

    .hamburger span:nth-child(2) {
      margin: 4px 0;
    }

    .hamburger.open span:nth-child(1) {
      transform: translateY(6px) rotate(45deg);
    }

    .hamburger.open span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.open span:nth-child(3) {
      transform: translateY(-6px) rotate(-45deg);
    }
  </style>
</head>

<body>

<!-- NAVBAR (REWORKED) -->
<header class="fixed top-5 left-0 w-full z-50">

  <nav class="max-w-6xl mx-auto px-4">

    <div class="
      relative
      flex items-center justify-between
      px-6 py-3
      rounded-2xl
      bg-white/5
      backdrop-blur-2xl
      border border-white/10
      shadow-[0_8px_30px_rgba(0,0,0,0.35)]
    ">

      <!-- subtle glow line -->
      <div class="absolute inset-0 rounded-2xl pointer-events-none
                  bg-gradient-to-r from-blue-500/10 via-transparent to-blue-500/10">
      </div>

      <!-- LOGO -->
      <div class="relative flex items-center">
        <img
          src="Novyra Identity Logo (Dark Theme).png"
          class="h-14 md:h-16 w-auto object-contain"
          alt="Novyra Logo"
        />
      </div>

      <!-- DESKTOP NAV -->
      <div class="hidden md:flex items-center gap-8 text-sm text-gray-300 relative">

        <a href="#home"
           class="hover:text-white transition relative after:absolute after:left-0 after:-bottom-1 after:h-[1px] after:w-0 after:bg-blue-400 hover:after:w-full after:transition-all">
          Home
        </a>

        <a href="https://www.novyra.co.za/contact-us/"
           target="_blank"
           class="
             px-5 py-2 rounded-xl
             bg-white/5 border border-white/10
             hover:bg-white/10 hover:text-white
             transition
           ">
          Contact Us
        </a>

      </div>

      <!-- HAMBURGER -->
      <button id="menuBtn"
              class="hamburger md:hidden flex flex-col justify-center items-center w-11 h-11 rounded-xl
                     hover:bg-white/10 transition">
        <span></span>
        <span></span>
        <span></span>
      </button>

    </div>

    <!-- MOBILE DROPDOWN -->
    <div id="mobileMenu"
         class="dropdown md:hidden mt-3 px-6 py-4
                rounded-2xl bg-white/5 backdrop-blur-2xl
                border border-white/10">

      <div class="flex flex-col gap-4 text-gray-300 text-sm">

        <a href="#home" class="hover:text-white transition">Home</a>

        <a href="https://www.novyra.co.za/contact-us/"
           target="_blank"
           class="hover:text-white transition">
          Contact Us
        </a>

      </div>

    </div>

  </nav>
</header>

<!-- HOME -->
<section id="home" class="min-h-screen flex items-center justify-center px-6 pt-28">

  <div class="text-center max-w-3xl">

    <h1 class="text-4xl md:text-6xl font-bold mb-6">
      Welcome to Novyra
    </h1>

    <p class="text-gray-400 text-lg md:text-xl mb-8 leading-relaxed">
      A modern digital presence built for clarity, performance, and creative direction.
      Novyra represents the new era of creation.
    </p>

    <button class="px-6 py-3 rounded-xl font-medium"
            style="background: rgba(59,130,246,1);">
      Get Started
    </button>

  </div>

</section>

<!-- FOOTER -->
<footer class="border-t border-white/10 text-center py-6 text-gray-500 text-sm">
  © 2026 Novyra. All rights reserved.
</footer>

<!-- SCRIPT -->
<script>
  const btn = document.getElementById("menuBtn");
  const menu = document.getElementById("mobileMenu");

  btn.addEventListener("click", () => {
    menu.classList.toggle("open");
    btn.classList.toggle("open");
  });
</script>

</body>
</html>
