<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Novyra - New Era of Creation</title>

  <!-- FAVICON (LIGHT THEME AS DEFAULT) -->
  <link id="favicon" rel="icon" type="image/png" href="Novyra Tab Icon (Light Theme).png">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>

    :root{
      --bg: #f3f4f6;
      --text: rgb(15 23 42);
      --footer-text: #000000;
    }

    body.dark-mode{
      --bg: rgb(38 38 40);
      --text: white;
      --footer-text: #ffffff;
    }

    body{
      margin:0;
      font-family:sans-serif;
      background:var(--bg);
      color:var(--text);
      transition:.3s ease;
      overflow-x:hidden;
    }

    html{ scroll-behavior:smooth; }

    /* GLASS */
    .glass-card{
      background: rgba(255,255,255,.4);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.3);
      box-shadow: 0 8px 32px rgba(0,0,0,.1);
      position: relative;
      overflow:hidden;
    }

    body.dark-mode .glass-card{
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 12px 40px rgba(0,0,0,.45);
    }

    .icon{
      position:absolute;
      width:20px;
      height:20px;
      transition:.3s ease;
    }

    #backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.25);
      opacity:0;
      pointer-events:none;
      transition:.3s ease;
    }

    #backdrop.show{
      opacity:1;
      pointer-events:auto;
    }

    .dropdown{
      max-height:0;
      overflow:hidden;
      transition:.3s ease;
    }

    .dropdown.open{
      max-height:300px;
    }

  </style>
</head>

<body>

<div id="backdrop"></div>

<header class="fixed top-4 w-full z-50">

  <div class="max-w-screen-xl mx-auto px-6 flex items-stretch gap-4">

    <nav class="flex-1">

      <div class="h-16 px-6 glass-card flex items-center justify-between">

        <!-- NAVBAR LOGO (UPDATED RULES) -->
        <img
          id="navLogo"
          src="Novyra Navigation Bar Logo (Dark Theme).png"
          class="h-10 md:h-12 w-auto"
        >

        <div class="hidden md:flex items-center gap-6 text-sm">

          <a href="#home">Home</a>

          <a href="https://www.novyra.co.za/contact-us/"
             class="px-5 py-2 rounded-2xl bg-blue-500 text-white">
            Contact Us
          </a>

        </div>

        <button id="menuBtn">☰</button>

      </div>

    </nav>

    <!-- THEME BUTTON -->
    <button id="themeToggle"
      class="h-16 w-16 glass-card flex items-center justify-center relative overflow-hidden">

      <svg id="sunIcon" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="4"></circle>
      </svg>

      <svg id="moonIcon" class="icon opacity-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M21 12.6A8.5 8.5 0 1 1 11.4 3a6.8 6.8 0 0 0 9.6 9.6Z"/>
      </svg>

    </button>

  </div>

</header>

<section id="home" class="min-h-screen pt-24"></section>

<footer class="text-center py-6 text-sm" style="color: var(--footer-text);">
  © 2026 Novyra. All rights reserved.
</footer>

<script>

const body = document.body;

const navLogo = document.getElementById("navLogo");
const favicon = document.getElementById("favicon");

const themeToggle = document.getElementById("themeToggle");
const sunIcon = document.getElementById("sunIcon");
const moonIcon = document.getElementById("moonIcon");

/* THEME */
function updateTheme(){

  const isDark = body.classList.contains("dark-mode");

  /* NAV LOGO RULES */
  navLogo.src = isDark
    ? "Novyra Navigation Bar Logo (Light Theme).png"
    : "Novyra Navigation Bar Logo (Dark Theme).png";

  /* FAVICON (only one provided so stays same unless you add dark version) */
  favicon.href = "Novyra Tab Icon (Light Theme).png";

  /* ICONS */
  sunIcon.style.opacity = isDark ? "0" : "1";
  moonIcon.style.opacity = isDark ? "1" : "0";
}

/* TOGGLE */
themeToggle.onclick = () => {
  body.classList.toggle("dark-mode");

  localStorage.setItem(
    "novyra-theme",
    body.classList.contains("dark-mode") ? "dark" : "light"
  );

  updateTheme();
};

/* LOAD THEME */
if(localStorage.getItem("novyra-theme")==="dark"){
  body.classList.add("dark-mode");
}

updateTheme();

</script>

</body>
</html>
